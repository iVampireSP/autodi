<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Package Diagram</title>
<script src="https://cdn.jsdelivr.net/npm/graphology@0.25.4/dist/graphology.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sigma@2.4.0/build/sigma.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,-apple-system,sans-serif;background:#0f1117;color:#ddd;overflow:hidden}
#toolbar{position:fixed;top:0;left:0;right:0;height:48px;background:#1a1d27;border-bottom:1px solid #2a2d3a;z-index:10;display:flex;align-items:center;padding:0 16px;gap:10px}
#toolbar h1{font-size:14px;font-weight:600;white-space:nowrap}
#search{flex:1;max-width:260px;padding:5px 10px;background:#252836;border:1px solid #3a3d4a;border-radius:6px;color:#ddd;font-size:13px;outline:none}
#search::placeholder{color:#666}
#node-count{font-size:11px;color:#666;white-space:nowrap}
#hint{font-size:11px;color:#555;white-space:nowrap}
#sigma-container{position:absolute;top:48px;left:0;right:0;bottom:0}
#tooltip{position:fixed;background:#1c1f2eee;border:1px solid #3a3d4a;border-radius:8px;padding:10px 13px;font-size:12px;line-height:1.5;max-width:260px;z-index:20;pointer-events:none;display:none;box-shadow:0 4px 12px #0006}
.tt-title{font-weight:600;font-size:13px;margin-bottom:3px}
.tt-sub{color:#888;font-size:11px;margin-bottom:4px}
.tt-badge{display:inline-block;padding:1px 7px;border-radius:10px;font-size:10px;font-weight:600;color:#fff;margin-bottom:5px}
.tt-stat{color:#aaa;margin-top:2px}
.tt-divider{border-top:1px solid #2a2d3a;margin:6px 0}
.tt-method{color:#8ab;font-size:11px}
#legend{position:fixed;bottom:16px;right:16px;background:#1a1d27cc;border:1px solid #2a2d3a;border-radius:8px;padding:10px 13px;z-index:10;font-size:12px;backdrop-filter:blur(4px)}
.li{display:flex;align-items:center;gap:7px;line-height:2}
.dot{width:11px;height:11px;border-radius:50%;flex-shrink:0}
</style>
</head>
<body>
<div id="toolbar">
  <h1>Package Diagram</h1>
  <input id="search" type="search" placeholder="Search nodes…">
  <span id="node-count"></span>
  <span id="hint">click=node chain · bg-click=reset · search=highlight</span>
</div>
<div id="sigma-container"></div>
<div id="tooltip"></div>
<div id="legend"><div class="li"><span class="dot" style="background:#2980b9"></span>Struct</div><div class="li"><span class="dot" style="background:#e67e22"></span>Interface</div><div class="li"><span class="dot" style="background:#c0392b"></span>Decorator</div><div class="li"><span class="dot" style="background:#e67e22"></span>→ implements</div><div class="li"><span class="dot" style="background:#6c757d"></span>→ depends</div></div>
<script>
(function(){

"color":"#e67e22","implCount":0,"label":"TestingT","methods":["Error([]any)","FailNow()"],"nodeType":"interface","pkg":"ent/enttest","size":10,"useCount":0,"usedBy":0,"x":1020,"y":0}},{"key":"ent_hook_Chain","attributes":{"color":"#2980b9","label":"Chain","methods":["Append([]Hook) Chain","Extend(Chain) Chain","Hook() Hook"],"nodeType":"struct","pkg":"ent/hook","size":8,"usedBy":0,"x":0,"y":280}},{"key":"ent_migrate_Schema","attributes":{"color":"#2980b9","label":"Schema","methods":["Create(Context, []MigrateOption) error","WriteTo(Context, Writer, []MigrateOption) error"],"nodeType":"struct","pkg":"ent/migrate","size":10,"usedBy":1,"x":340,"y":280}},{"key":"ent_schema_User","attributes":{"color":"#2980b9","label":"User","methods":["Annotations() []Annotation","Config() Config","Edges() []Edge","Fields() []Field","Hooks() []Hook","Indexes() []Index"],"nodeType":"struct","pkg":"ent/schema","size":8,"usedBy":0,"x":680,"y":280}},{"key":"internal_cache_Cache","attributes":{"color":"#2980b9","label":"Cache","methods":["Close()","Get(string) string","Set(string, string)"],"nodeType":"struct","pkg":"internal/cache","size":10,"usedBy":1,"x":1020,"y":280}},{"key":"internal_config_Config","attributes":{"color":"#2980b9","label":"Config","methods":[],"nodeType":"struct","pkg":"internal/config","size":16,"usedBy":4,"x":0,"y":560}},{"key":"internal_db_DB","attributes":{"color":"#2980b9","label":"DB","methods":["Close()","Query(string) []string"],"nodeType":"struct","pkg":"internal/db","size":10,"usedBy":1,"x":340,"y":560}},{"key":"internal_mailer_Mailer","attributes":{"color":"#2980b9","label":"Mailer","methods":["Notify(string, string, string)"],"nodeType":"struct","pkg":"internal/mailer","size":12,"usedBy":2,"x":680,"y":560}},{"key":"internal_mailer_TwoFactorDisabledMail","attributes":{"color":"#2980b9","label":"TwoFactorDisabledMail","methods":[],"nodeType":"struct","pkg":"internal/mailer","size":8,"usedBy":0,"x":830,"y":560}},{"key":"internal_notify_Notifier","attributes":{"color":"#e67e22","implCount":2,"label":"Notifier","methods":["Name() string","Send(string, string, string) error"],"nodeType":"interface","pkg":"internal/notify","size":16,"useCount":1,"usedBy":1,"x":1020,"y":560}},{"key":"internal_notify_email_Email","attributes":{"color":"#2980b9","label":"Email","methods":["Name() string","Send(string, string, string) error"],"nodeType":"struct","pkg":"internal/notify/email","size":8,"usedBy":0,"x":0,"y":840}},{"key":"internal_notify_slack_Slack","attributes":{"color":"#2980b9","label":"Slack","methods":["Name() string","Send(string, string, string) error"],"nodeType":"struct","pkg":"internal/notify/slack","size":8,"usedBy":0,"x":340,"y":840}},{"key":"internal_user_Service","attributes":{"color":"#2980b9","label":"Service","methods":["Create(string) error","Find(string) string, error"],"nodeType":"struct","pkg":"internal/user","size":10,"usedBy":1,"x":680,"y":840}}],"edges":[{"key":"e0","source":"internal_notify_email_Email","target":"internal_notify_Notifier","attributes":{"color":"#e67e22","label":"implements","size":1.5}},{"key":"e1","source":"internal_notify_slack_Slack","target":"internal_notify_Notifier","attributes":{"color":"#e67e22","label":"implements","size":1.5}},{"key":"e2","source":"cmd_api_API","target":"internal_user_Service","attributes":{"color":"#6c757d","label":"depends","size":1.5}},{"key":"e3","source":"cmd_api_API","target":"internal_mailer_Mailer","attributes":{"color":"#6c757d","label":"depends","size":1.5}},{"key":"e4","source":"cmd_worker_Worker","target":"internal_mailer_Mailer","attributes":{"color":"#6c757d","label":"depends","size":1.5}},{"key":"e5","source":"internal_cache_Cache","target":"internal_config_Config","attributes":{"color":"#6c757d","label":"depends","size":1.5}},{"key":"e6","source":"internal_db_DB","target":"internal_config_Config","attributes":{"color":"#6c757d","label":"depends","size":1.5}},{"key":"e7","source":"internal_mailer_Mailer","target":"internal_notify_Notifier","attributes":{"color":"#6c757d","label":"depends","size":1.5}},{"key":"e8","source":"internal_notify_email_Email","target":"internal_config_Config","attributes":{"color":"#6c757d","label":"depends","size":1.5}},{"key":"e9","source":"internal_notify_slack_Slack","target":"internal_config_Config","attributes":{"color":"#6c757d","label":"depends","size":1.5}},{"key":"e10","source":"internal_user_Service","target":"internal_db_DB","attributes":{"color":"#6c757d","label":"depends","size":1.5}},{"key":"e11","source":"internal_user_Service","target":"internal_cache_Cache","attributes":{"color":"#6c757d","label":"depends","size":1.5}},{"key":"e12","source":"internal_user_Service","target":"ent_Client","attributes":{"color":"#6c757d","label":"depends","size":1.5}},{"key":"e13","source":"ent_Client","target":"ent_migrate_Schema","attributes":{"color":"#95a5a6","label":"field","size":1.5}},{"key":"e14","source":"ent_Client","target":"ent_UserClient","attributes":{"color":"#95a5a6","label":"field","size":1.5}},{"key":"e15","source":"ent_Tx","target":"ent_UserClient","attributes":{"color":"#95a5a6","label":"field","size":1.5}},{"key":"e16","source":"ent_UserSelect","target":"ent_UserQuery","attributes":{"color":"#95a5a6","label":"field","size":1.5}}]};

function buildTooltip(node, a) {
  const typeLabel = {struct:'Struct',interface:'Interface',decorator:'Decorator'};
  let h = '<div class="tt-title">' + a.label + '</div>';
  if (a.pkg) h += '<div class="tt-sub">' + a.pkg + '</div>';
  h += '<span class="tt-badge" style="background:' + a.color + '">' + (typeLabel[a.nodeType]||a.nodeType) + '</span>';
  if (a.nodeType === 'interface' && (a.implCount > 0 || a.useCount > 0))
    h += '<div class="tt-stat">' + a.implCount + ' impl · ' + a.useCount + ' use</div>';
  else if (a.usedBy > 0)
    h += '<div class="tt-stat">used by <b>' + a.usedBy + '</b></div>';
  if (a.methods && a.methods.length > 0) {
    h += '<div class="tt-divider"></div>';
    a.methods.forEach(m => { h += '<div class="tt-method">+' + m + '</div>'; });
  }
  return h;
}

// ── Build graphology graph ────────────────────────────────────────────────────
const graph = new graphology.Graph({multi: true, type: 'directed'});
DATA.nodes.forEach(n => graph.addNode(n.key, n.attributes));
DATA.edges.forEach(e => {
  try { graph.addEdge(e.source, e.target, e.attributes); } catch(_) {}
});

// Node x/y positions are pre-computed in Go (hierarchical for DI, package-clustered
// for the package diagram) and embedded in DATA.nodes[*].attributes.

// ── Sigma renderer ────────────────────────────────────────────────────────────
const container = document.getElementById('sigma-container');
const renderer = new Sigma(graph, container, {
  defaultEdgeType: 'arrow',
  renderEdgeLabels: false,
  labelFont: 'system-ui, sans-serif',
  labelSize: 12,
  labelWeight: '500',
  labelColor: {color: '#c8c8c8'},
  edgeLabelFont: 'system-ui, sans-serif',
  edgeLabelSize: 9,
	edgeLabelColor: {color: '#666'},
	minCameraRatio: 0.02,
	maxCameraRatio: 200,
	labelThreshold: 1.2,
});

// ── Full graph interaction (no filtering) ─────────────────────────────────────
const origNodeColors = {};
const origNodeLabels = {};
const origEdgeColors = {};
const origEdgeSizes  = {};

graph.forEachNode((n, a) => {
  origNodeColors[n] = a.color;
  origNodeLabels[n] = a.label;
  graph.setNodeAttribute(n, 'hidden', false);
});
graph.forEachEdge((e, a) => {
  origEdgeColors[e] = a.color;
  origEdgeSizes[e]  = a.size || 1.5;
  graph.setEdgeAttribute(e, 'hidden', false);
});

document.getElementById('node-count').textContent =
  DATA.nodes.length + ' nodes · ' + DATA.edges.length + ' edges';

const DIM_NODE_COLOR = '#1f2433';
const DIM_EDGE_COLOR = '#2a3042';

let activeNode = null;
let activeQuery = '';

function resetGraphStyles() {
  graph.forEachNode(n => {
    graph.setNodeAttribute(n, 'color', origNodeColors[n]);
    graph.setNodeAttribute(n, 'label', origNodeLabels[n]);
  });
  graph.forEachEdge(e => {
    graph.setEdgeAttribute(e, 'color', origEdgeColors[e]);
    graph.setEdgeAttribute(e, 'size', origEdgeSizes[e]);
  });
}

function collectDirectedChain(seed) {
  const nodes = new Set([seed]);
  const edgePairs = new Set();

  // Upstream dependencies (dep -> consumer)
  const upQueue = [seed];
  for (let i = 0; i < upQueue.length; i++) {
    const cur = upQueue[i];
    graph.inNeighbors(cur).forEach(dep => {
      edgePairs.add(dep + '|' + cur);
      if (!nodes.has(dep)) {
        nodes.add(dep);
        upQueue.push(dep);
      }
    });
  }

  // Downstream consumers (producer -> consumer)
  const downQueue = [seed];
  for (let i = 0; i < downQueue.length; i++) {
    const cur = downQueue[i];
    graph.outNeighbors(cur).forEach(cons => {
      edgePairs.add(cur + '|' + cons);
      if (!nodes.has(cons)) {
        nodes.add(cons);
        downQueue.push(cons);
      }
    });
  }

  return {nodes, edgePairs};
}

function applyHighlight(nodes, edgePairs) {
  graph.forEachNode(n => {
    const on = nodes.has(n);
    graph.setNodeAttribute(n, 'color', on ? origNodeColors[n] : DIM_NODE_COLOR);
    graph.setNodeAttribute(n, 'label', on ? origNodeLabels[n] : '');
  });

  graph.forEachEdge((e, _a, src, tgt) => {
    const on = edgePairs.has(src + '|' + tgt);
    graph.setEdgeAttribute(e, 'color', on ? origEdgeColors[e] : DIM_EDGE_COLOR);
    graph.setEdgeAttribute(e, 'size', on ? Math.max(2.2, (origEdgeSizes[e] || 1.5) * 1.5) : 0.8);
  });
}

function applySearch(query) {
  if (!query) {
    resetGraphStyles();
    return;
  }

  const hits = new Set();
  graph.forEachNode((n, a) => {
    if (String(origNodeLabels[n] || '').toLowerCase().includes(query) ||
        (a.pkg && a.pkg.toLowerCase().includes(query))) {
      hits.add(n);
    }
  });

  if (hits.size === 0) {
    resetGraphStyles();
    return;
  }

  // Search mode: highlight matching nodes only.
  applyHighlight(hits, new Set());
}

function renderState() {
  if (activeNode && graph.hasNode(activeNode)) {
    const chain = collectDirectedChain(activeNode);
    applyHighlight(chain.nodes, chain.edgePairs);
  } else {
    applySearch(activeQuery);
  }
  renderer.refresh();
}

// ── Tooltip ───────────────────────────────────────────────────────────────────
const tooltip = document.getElementById('tooltip');
let mouseX = 0, mouseY = 0;
document.addEventListener('mousemove', evt => {
  mouseX = evt.clientX; mouseY = evt.clientY;
  if (tooltip.style.display !== 'none') {
    tooltip.style.left = (mouseX + 16) + 'px';
    tooltip.style.top  = Math.min(mouseY + 8, window.innerHeight - 20) + 'px';
  }
});
renderer.on('enterNode', ({node}) => {
  const attrs = graph.getNodeAttributes(node);
  tooltip.innerHTML = buildTooltip(node, attrs);
  tooltip.style.left = (mouseX + 16) + 'px';
  tooltip.style.top  = (mouseY + 8) + 'px';
  tooltip.style.display = 'block';
});
renderer.on('leaveNode', () => { tooltip.style.display = 'none'; });

// ── Click: highlight full dependency/call chain ────────────────────────────────
renderer.on('clickNode', ({node}) => {
  activeNode = node;
  renderState();
});
renderer.on('clickStage', () => {
  activeNode = null;
  renderState();
});

// ── Search: highlight matching nodes ───────────────────────────────────────────
document.getElementById('search').addEventListener('input', evt => {
  activeNode = null;
  activeQuery = evt.target.value.toLowerCase().trim();
  renderState();
});

// Initial render.
renderState();

})();
</script>
</body>
</html>
